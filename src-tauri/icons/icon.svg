<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 512 512"
   width="512"
   height="512"
   version="1.1"
   id="svg7"
   sodipodi:docname="icon.svg"
   inkscape:version="1.3.2 (091e20e, 2023-11-25, custom)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview7"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="2.2128906"
     inkscape:cx="256"
     inkscape:cy="256"
     inkscape:window-width="2560"
     inkscape:window-height="1334"
     inkscape:window-x="-11"
     inkscape:window-y="-11"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg7" />
  <!-- ============================================================
       MySerial 图标 (小尺寸优化版)
       设计原则: 16x16 下仅约 14x14 可用像素, 必须极简。
       只保留三个最强识别符号:
         1. 深色圆角终端窗口   (深色矩形, 最易辨识)
         2. 粗大绿色 ">" 提示符 + 光标块 (终端最强语义)
         3. 底部粗方波          (串口数字信号流, 区别于普通终端)
       砍掉: 三色窗口点/ANSI彩条/连接环/渐变高光/标题栏分隔线
       所有线条加粗到 16px 下仍可见的程度。
  ============================================================ -->
  <defs
     id="defs5">
    <!-- 背景: 亮蓝 -> 深靛 (纯色块在 16px 也只是一片蓝, 不糊) -->
    <linearGradient
       id="bg"
       x1="0"
       y1="0"
       x2="1"
       y2="1">
      <stop
         offset="0"
         stop-color="#3b82f6"
         id="stop1" />
      <stop
         offset="0.55"
         stop-color="#1d4ed8"
         id="stop2" />
      <stop
         offset="1"
         stop-color="#1e1b4b"
         id="stop3" />
    </linearGradient>
    <!-- 终端窗口深色渐变 -->
    <linearGradient
       id="term"
       x1="63.511433"
       y1="98.50195"
       x2="63.511433"
       y2="449.68282"
       gradientTransform="matrix(1.4579384,0,0,1.2718185,-92.595743,-92.595745)"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0"
         stop-color="#0f172a"
         id="stop4" />
      <stop
         offset="1"
         stop-color="#020617"
         id="stop5" />
    </linearGradient>
  </defs>
  <!-- 背景圆角方形 -->
  <!-- 终端窗口: 大、边框粗 (浅蓝描边 8px, 16px 下约 0.25px 仍可见) -->
  <rect
     x="5.4468093"
     y="38.127659"
     width="501.10638"
     height="435.74469"
     rx="38.127663"
     ry="38.127663"
     fill="url(#term)"
     stroke="#bfdbfe"
     stroke-width="10.8936"
     id="rect6"
     style="fill:url(#term)" />
  <!-- 粗大绿色 ">" 提示符 (描边 30, 16px 下约 0.94px, 明显可见) -->
  <path
     d="m 87.148939,190.63829 92.595741,65.3617 -92.595741,65.36172"
     fill="none"
     stroke="#4ade80"
     stroke-width="40.851"
     stroke-linecap="round"
     stroke-linejoin="round"
     id="path6" />
  <!-- 绿色闪烁光标块 (实心矩形, 极易识别) -->
  <rect
     x="239.65956"
     y="228.76595"
     width="43.574471"
     height="54.468086"
     rx="5.4468088"
     fill="#4ade80"
     id="rect7"
     style="stroke-width:1.3617" />
  <!-- 底部粗方波: 串口数字信号流 (描边 14, 波形大幅简化) -->
  <path
     d="m 87.148939,441.19149 h 49.021281 v -49.02128 h 43.57446 v 49.02128 h 59.9149 v -49.02128 h 43.57446 v 49.02128 h 65.3617 v -49.02128 h 43.57448 v 49.02128 h 32.68084"
     fill="none"
     stroke="#93c5fd"
     stroke-width="19.0638"
     stroke-linecap="round"
     stroke-linejoin="miter"
     id="path7" />
</svg>
